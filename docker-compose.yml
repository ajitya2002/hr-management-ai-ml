
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    mem_limit: 2g
    cpus: 2.0

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    mem_limit: 6g
    cpus: 4.0
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1